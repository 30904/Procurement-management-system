# Nginx — https://pms.idms-atp.com
# Install: sudo cp deploy/nginx-pms.idms-atp.com.conf /etc/nginx/sites-available/pms
#          sudo ln -sf /etc/nginx/sites-available/pms /etc/nginx/sites-enabled/pms
#          sudo nginx -t && sudo systemctl reload nginx
#
# Replace /var/www/pms with your deploy path.
# SSL: certbot --nginx -d pms.idms-atp.com

upstream pms_api {
    server 127.0.0.1:5020;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name pms.idms-atp.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pms.idms-atp.com;

    # Certbot / Let's Encrypt paths (adjust if using custom certs)
    ssl_certificate     /etc/letsencrypt/live/pms.idms-atp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pms.idms-atp.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/pms/frontend/dist;
    index index.html;

    client_max_body_size 25m;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    location /api/ {
        proxy_pass http://pms_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}

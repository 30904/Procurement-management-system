<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 32" fill="none" role="img" aria-label="SmartApp">
  <!-- Enterprise palette: primary #0F7C94, shades + slate hub -->
  <g transform="translate(0 4)">
    <!-- Top blade (was red) -->
    <polygon fill="#3D9DB3" points="15.63 6.48 16.93 0 13.1 5.37 9.26 10.74 12.61 9.98 14.34 12.95 15.63 6.48"/>
    <!-- Left blade (was orange) -->
    <polygon fill="#5CB4C9" points="12.91 9.3 6.46 8.01 0 6.73 5.34 10.56 10.68 14.39 9.94 11.04 12.91 9.3"/>
    <!-- Bottom blade (was blue) -->
